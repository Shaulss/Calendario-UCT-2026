<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Académico UCT</title>
    <style>
        :root {
            --primary: #0f4c81;
            --success: #2ecc71;
            --warning: #f1c40f;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        header {
            text-align: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        h1 { margin: 0; color: var(--primary); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: var(--light);
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .search-box {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: var(--primary); color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .alert-card {
            background: #e8f8f5;
            border-left: 5px solid var(--success);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .info-card {
            background: #ebf5fb;
            border-left: 5px solid var(--primary);
            padding: 15px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Calendario Académico UCT</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vigentes')">🔥 Vigentes</button>
        <button class="tab-btn" onclick="switchTab('proximos')">⏳ Próximos Eventos</button>
        <button class="tab-btn" onclick="switchTab('buscar')">🔍 Buscador Dinámico</button>
    </div>

    <div id="vigentes" class="tab-content active">
        <h2>Actividades de Hoy</h2>
        <div id="lista-vigentes">Cargando datos...</div>
    </div>

    <div id="proximos" class="tab-content">
        <h2>Próximos Eventos en el Año</h2>
        <table>
            <thead>
                <tr>
                    <th>Inicio</th>
                    <th>Término</th>
                    <th>Actividad</th>
                    <th>Agentes</th>
                </tr>
            </thead>
            <tbody id="tabla-proximos">
                <tr><td colspan="4">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="buscar" class="tab-content">
        <h2>Búsqueda Flexible</h2>
        <input type="text" id="input-buscar" class="search-box" placeholder="Escribe aquí para buscar (ej: feriado, suspension, examen)..." oninput="filtrarActividades()">
        <table>
            <thead>
                <tr>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Actividad</th>
                    <th>Destinado A</th>
                </tr>
            </thead>
            <tbody id="tabla-busqueda">
                <tr><td colspan="4">Escribe al menos 2 letras para buscar...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let todasLasActividades = [];

    window.onload = async function() {
        const contenedorVigentes = document.getElementById('lista-vigentes');
        try {
            let response = await fetch('/api/actividades');
            if (!response.ok) {
                throw new Error("Código de respuesta del servidor: " + response.status);
            }
            todasLasActividades = await response.json();
            renderizarTablas();
        } catch (error) {
            console.error("Error al cargar la API:", error);
            contenedorVigentes.innerHTML = `<p style="color: red; font-weight: bold;">❌ Error al conectar con el backend: ${error.message}. Asegúrate de que server.py esté corriendo.</p>`;
        }
    };

    function renderizarTablas() {
        // 1. Renderizar Vigentes
        const contenedorVigentes = document.getElementById('lista-vigentes');
        const vigentes = todasLasActividades.filter(a => a.Estado === 'Vigente');
        
        if(vigentes.length === 0) {
            contenedorVigentes.innerHTML = `
                <div class="info-card">
                    <strong>Información:</strong> No hay actividades académicas ocurriendo en la fecha de hoy. Puedes revisar las pestañas de arriba.
                </div>`;
        } else {
            contenedorVigentes.innerHTML = vigentes.map(a => `
                <div class="alert-card">
                    <strong>[${a.INICIO} ${a.TERMINO ? 'hasta ' + a.TERMINO : ''}]</strong> — ${a.ACTIVIDAD} <br>
                    <small style="color: #666;">Para: ${a.AGENTES}</small>
                </div>
            `).join('');
        }

        // 2. Renderizar Próximos
        const tablaProximos = document.getElementById('tabla-proximos');
        const proximos = todasLasActividades.filter(a => a.Estado === 'Próximo').slice(0, 15);
        
        if (proximos.length === 0) {
            tablaProximos.innerHTML = '<tr><td colspan="4">No se registran eventos futuros para el resto del año.</td></tr>';
        } else {
            tablaProximos.innerHTML = proximos.map(a => `
                <tr>
                    <td>${a.INICIO}</td>
                    <td>${a.TERMINO || '-'}</td>
                    <td><strong>${a.ACTIVIDAD}</strong></td>
                    <td>${a.AGENTES}</td>
                </tr>
            `).join('');
        }
    }

    function filtrarActividades() {
        const texto = document.getElementById('input-buscar').value.toLowerCase();
        const tablaBusqueda = document.getElementById('tabla-busqueda');
        
        if (texto.length < 2) {
            tablaBusqueda.innerHTML = '<tr><td colspan="4">Escribe al menos 2 letras...</td></tr>';
            return;
        }

        const filtradas = todasLasActividades.filter(a => 
            a.ACTIVIDAD.toLowerCase().includes(texto) || a.AGENTES.toLowerCase().includes(texto)
        );

        if(filtradas.length === 0) {
            tablaBusqueda.innerHTML = '<tr><td colspan="4">No se encontraron coincidencias.</td></tr>';
            return;
        }

        tablaBusqueda.innerHTML = filtradas.map(a => `
            <tr>
                <td><span style="color: ${a.Estado === 'Pasado' ? 'gray' : 'green'}; font-weight: bold;">${a.Estado}</span></td>
                <td>${a.INICIO}</td>
                <td>${a.ACTIVIDAD}</td>
                <td>${a.AGENTES}</td>
            </tr>
        `).join('');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
